org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Disable Kotlin incremental compilation to fix cross-drive path issues (C: pub cache vs F: project)
kotlin.incremental=false
kotlin.incremental.android=false
# Disable daemon to avoid stale cache issues
org.gradle.daemon=false
# Parallel builds
org.gradle.parallel=true
org.gradle.caching=false
